spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**

        - id: quantity-service
          uri: lb://QUANTITY-SERVICE
          predicates:
            - Path=/api/quantity/**

        - id: auth-service-api-docs
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/aggregate/auth-service/**
          filters:
            - RewritePath=/aggregate/auth-service/(?<path>.*), /$\{path}

        - id: quantity-service-api-docs
          uri: lb://QUANTITY-SERVICE
          predicates:
            - Path=/aggregate/quantity-service/**
          filters:
            - RewritePath=/aggregate/quantity-service/(?<path>.*), /$\{path}

      
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveUserDetailsServiceAutoConfiguration

server:
  port: ${PORT:8080}

eureka:
  client:
    service-url:
      defaultZone: https://quantitymeasurementapp-production-d15a.up.railway.app/eureka
  instance:
    prefer-ip-address: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    urls:
      - name: auth-service
        url: /aggregate/auth-service/v3/api-docs
      - name: quantity-service
        url: /aggregate/quantity-service/v3/api-docs

  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: "*"