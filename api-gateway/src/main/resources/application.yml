spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**

        - id: quantity-service
          uri: lb://QUANTITY-SERVICE
          predicates:
            - Path=/api/quantity/**

        - id: auth-service-api-docs
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/aggregate/auth-service/**
          filters:
            - RewritePath=/aggregate/auth-service/(?<path>.*), /$\{path}

        - id: quantity-service-api-docs
          uri: lb://QUANTITY-SERVICE
          predicates:
            - Path=/aggregate/quantity-service/**
          filters:
            - RewritePath=/aggregate/quantity-service/(?<path>.*), /$\{path}

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveUserDetailsServiceAutoConfiguration

server:
  port: ${PORT:8080}

# Single merged eureka block
eureka:
  client:
    service-url:
      defaultZone: https://quantitymeasurementapp-production-d15a.up.railway.app/eureka
  instance:
    prefer-ip-address: false
    hostname: api-gateway-production-d707.up.railway.app
    non-secure-port: 443
    non-secure-port-enabled: true
    secure-port-enabled: false
    status-page-url: https://api-gateway-production-d707.up.railway.app/actuator/info
    health-check-url: https://api-gateway-production-d707.up.railway.app/actuator/health
    home-page-url: https://api-gateway-production-d707.up.railway.app/

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    urls:
      - name: auth-service
        url: /aggregate/auth-service/v3/api-docs
      - name: quantity-service
        url: /aggregate/quantity-service/v3/api-docs
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: "*"